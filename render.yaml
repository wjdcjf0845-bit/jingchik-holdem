# Render Blueprint — 이 저장소를 Render에 연결하면 자동으로 서비스가 구성됩니다.
# 대시보드: New + → Blueprint → 이 저장소 선택
services:
  - type: web
    name: jingchik-holdem
    runtime: node
    plan: free                   # 무료 플랜 (15분 무접속 시 잠듦 → UptimeRobot로 5분마다 깨움)
    region: singapore            # 한국에서 가장 가까운 리전 (다른 옵션: oregon, ohio, virginia, frankfurt)
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /healthz     # 가벼운 헬스체크 (UptimeRobot도 이 경로를 노크)
    autoDeploy: true             # 연결된 브랜치에 push하면 자동 재배포
    envVars:
      - key: NODE_VERSION
        value: "20"
      # 💾 Turso 원격 전적 DB (무료) — 값은 Render 대시보드 Environment 탭에서 직접 입력
      #    미입력 시 로컬 파일 저장(재배포마다 초기화)으로 동작
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
# ⚠️ 무료 플랜은 영구 디스크를 붙일 수 없어 계정/뱅크롤이 재배포·재시작 시 초기화됩니다.
#    데이터를 영구 보존하려면 plan을 starter(유료, ~$7/월)로 바꾸고 아래 disk 블록을 추가하세요:
#    plan: starter
#    envVars: [ { key: DATA_DIR, value: /var/data }, { key: NODE_VERSION, value: "20" } ]
#    disk: { name: poker-data, mountPath: /var/data, sizeGB: 1 }
