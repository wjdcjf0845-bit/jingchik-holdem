<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>рҹҺү нҢҢнӢ° лӮҳмқҙнҠё вҖ” TV</title>
<style>
  :root{ --bg:#0b1020; --card:#161c30; --card2:#1e2740; --line:#2b3554; --txt:#f1f5f9; --dim:#94a3b8;
         --accent:#f59e0b; --accent2:#38bdf8; --good:#22c55e; --bad:#ef4444; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{ background:var(--bg); color:var(--txt); font-family:'Pretendard','Apple SD Gothic Neo',system-ui,sans-serif;
        overflow:hidden; }
  #app{ height:100vh; display:flex; flex-direction:column; }
  .topbar{ display:flex; align-items:center; justify-content:space-between; padding:14px 28px; border-bottom:1px solid var(--line); }
  .brand{ font-size:26px; font-weight:800; letter-spacing:-.5px; }
  .brand small{ color:var(--dim); font-weight:600; font-size:16px; margin-left:8px; }
  .codechip{ background:var(--card2); border:1px solid var(--line); border-radius:12px; padding:8px 16px; font-size:22px; font-weight:800; letter-spacing:4px; }
  .codechip b{ color:var(--accent); }
  .main{ flex:1; overflow:hidden; padding:22px 40px; display:flex; flex-direction:column; }
  .ctrlbar{ display:flex; gap:14px; align-items:center; justify-content:center; padding:16px; border-top:1px solid var(--line); min-height:76px; }
  button.big{ font-size:22px; font-weight:800; padding:16px 34px; border-radius:14px; border:none; cursor:pointer;
              background:var(--accent); color:#1a1205; transition:transform .08s; }
  button.big:hover{ transform:translateY(-2px); }
  button.ghost{ background:var(--card2); color:var(--txt); border:1px solid var(--line); }
  button.blue{ background:var(--accent2); color:#04222f; }
  button.green{ background:var(--good); color:#052e12; }
  .hint{ color:var(--dim); font-size:16px; }

  /* Lobby */
  .lobby{ display:grid; grid-template-columns:380px 1fr; gap:34px; height:100%; }
  .joinbox{ background:var(--card); border:1px solid var(--line); border-radius:22px; padding:28px; display:flex; flex-direction:column; align-items:center; gap:16px; }
  .joinbox .qr{ background:#fff; border-radius:16px; padding:12px; width:260px; height:260px; display:flex; align-items:center; justify-content:center; }
  .joinbox .qr svg{ width:100%; height:100%; }
  .joinbox .url{ font-size:20px; color:var(--dim); }
  .joinbox .bigcode{ font-size:64px; font-weight:900; letter-spacing:10px; color:var(--accent); }
  .joinbox .label{ font-size:18px; color:var(--dim); }
  .rightcol{ display:flex; flex-direction:column; gap:20px; min-height:0; }
  .players{ background:var(--card); border:1px solid var(--line); border-radius:22px; padding:20px 24px; flex:1; min-height:0; overflow:auto; }
  .players h3{ font-size:20px; margin-bottom:14px; color:var(--dim); }
  .plist{ display:flex; flex-wrap:wrap; gap:12px; }
  .pchip{ display:flex; align-items:center; gap:10px; background:var(--card2); border:1px solid var(--line); border-radius:999px; padding:8px 16px 8px 8px; font-size:20px; font-weight:700; }
  .pchip.off{ opacity:.4; }
  .dot{ width:30px; height:30px; border-radius:50%; display:inline-block; }
  .games{ background:var(--card); border:1px solid var(--line); border-radius:22px; padding:20px 24px; }
  .games h3{ font-size:20px; margin-bottom:14px; color:var(--dim); }
  .gcards{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
  .gcard{ background:var(--card2); border:1px solid var(--line); border-radius:16px; padding:18px; cursor:pointer; text-align:center; transition:transform .08s, border-color .1s; }
  .gcard:hover{ transform:translateY(-3px); border-color:var(--accent); }
  .gcard .em{ font-size:44px; }
  .gcard .nm{ font-size:22px; font-weight:800; margin-top:6px; }
  .gcard .ds{ font-size:14px; color:var(--dim); margin-top:6px; height:36px; }
  .gcard.done{ opacity:.45; }
  .gcard.done::after{ content:'вң“ мҷ„лЈҢ'; display:block; color:var(--good); font-weight:800; margin-top:6px; }

  /* Generic game frame */
  .stage{ flex:1; display:flex; flex-direction:column; min-height:0; }
  .stagehead{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .stagehead .g{ font-size:26px; font-weight:800; }
  .stagehead .g .em{ font-size:30px; margin-right:8px; }
  .roundpill{ background:var(--card2); border:1px solid var(--line); border-radius:999px; padding:6px 16px; font-size:18px; color:var(--dim); }
  .clock{ font-size:40px; font-weight:900; color:var(--accent); font-variant-numeric:tabular-nums; }
  .clock.low{ color:var(--bad); animation:pulse .6s infinite alternate; }
  @keyframes pulse{ to{ transform:scale(1.12); } }
  .question{ font-size:46px; font-weight:900; text-align:center; margin:auto 0; line-height:1.25; padding:0 40px; }
  .cat{ text-align:center; font-size:18px; color:var(--accent2); font-weight:700; margin-bottom:10px; letter-spacing:2px; }
  .choices{ display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-top:auto; }
  .choice{ display:flex; align-items:center; gap:16px; background:var(--card2); border:2px solid var(--line); border-radius:16px; padding:22px 26px; font-size:30px; font-weight:800; }
  .choice .k{ width:52px; height:52px; border-radius:12px; background:var(--card); display:flex; align-items:center; justify-content:center; font-size:26px; color:var(--accent); }
  .choice.correct{ border-color:var(--good); background:rgba(34,197,94,.18); }
  .choice.dim{ opacity:.4; }
  .choice .cnt{ margin-left:auto; font-size:22px; color:var(--dim); }
  .answered{ text-align:center; font-size:22px; color:var(--dim); margin-top:14px; }
  .gains{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:16px; }
  .gains .g{ background:var(--card2); border:1px solid var(--line); border-radius:999px; padding:8px 16px; font-size:20px; }
  .gains .g b{ color:var(--good); }

  /* Balance */
  .bsplit{ display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:auto; height:52%; }
  .bside{ border-radius:20px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; font-size:40px; font-weight:900; border:3px solid var(--line); position:relative; overflow:hidden; }
  .bside.a{ background:linear-gradient(180deg, rgba(56,189,248,.18), transparent); }
  .bside.b{ background:linear-gradient(180deg, rgba(245,158,11,.18), transparent); }
  .bside.win{ border-color:var(--good); box-shadow:0 0 40px rgba(34,197,94,.35) inset; }
  .bside .num{ font-size:80px; }
  .bside .names{ font-size:18px; color:var(--dim); font-weight:600; max-width:90%; text-align:center; }
  .vs{ position:absolute; left:50%; top:60%; transform:translate(-50%,-50%); font-size:34px; font-weight:900; color:var(--dim); z-index:2; }

  /* Answers list (whowrote) */
  .answers{ display:flex; flex-direction:column; gap:12px; margin-top:16px; overflow:auto; }
  .ans{ display:flex; align-items:center; gap:16px; background:var(--card2); border:1px solid var(--line); border-radius:14px; padding:16px 20px; font-size:26px; }
  .ans .lt{ width:48px; height:48px; border-radius:12px; background:var(--card); display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:900; color:var(--accent); }
  .ans .au{ margin-left:auto; font-size:20px; color:var(--accent2); font-weight:700; }
  .ans .vt{ font-size:22px; color:var(--good); font-weight:800; min-width:70px; text-align:right; }

  /* Reaction */
  .reactBig{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; border-radius:24px; font-weight:900; }
  .reactBig.ready{ background:#3f2d05; color:var(--accent); font-size:60px; }
  .reactBig.go{ background:var(--good); color:#052e12; font-size:120px; animation:flash .3s infinite alternate; }
  @keyframes flash{ to{ filter:brightness(1.25);} }
  .rank{ display:flex; flex-direction:column; gap:10px; margin-top:16px; overflow:auto; }
  .rrow{ display:flex; align-items:center; gap:16px; background:var(--card2); border:1px solid var(--line); border-radius:14px; padding:14px 20px; font-size:26px; }
  .rrow .medal{ font-size:30px; width:44px; text-align:center; }
  .rrow .ms{ margin-left:auto; color:var(--dim); font-size:22px; }
  .rrow .pt{ color:var(--good); font-weight:800; min-width:80px; text-align:right; }

  /* Scoreboard / final */
  .board{ display:flex; flex-direction:column; gap:12px; max-width:900px; margin:0 auto; width:100%; overflow:auto; }
  .brow{ display:flex; align-items:center; gap:18px; background:var(--card2); border:1px solid var(--line); border-radius:16px; padding:16px 24px; font-size:30px; font-weight:800; transition:all .4s; }
  .brow .rk{ font-size:34px; width:60px; }
  .brow .sc{ margin-left:auto; color:var(--accent); }
  .brow.top1{ background:linear-gradient(90deg, rgba(245,158,11,.25), var(--card2)); border-color:var(--accent); }
  .brow.top2{ border-color:#cbd5e1; }
  .brow.top3{ border-color:#d97706; }
  .title-xl{ font-size:44px; font-weight:900; text-align:center; margin-bottom:8px; }
  .sub{ text-align:center; color:var(--dim); font-size:22px; margin-bottom:22px; }
  .center{ flex:1; display:flex; flex-direction:column; justify-content:center; }
  .confetti-em{ font-size:60px; text-align:center; }

  /* к·ёлҰј л§һнһҲкё° */
  .drawrow{ flex:1; display:grid; grid-template-columns:1fr 340px; gap:20px; min-height:0; margin-top:8px; }
  .canvaswrap{ background:#fff; border-radius:18px; border:1px solid var(--line); overflow:hidden; display:flex; align-items:center; justify-content:center; }
  #hcanvas{ width:100%; height:100%; object-fit:contain; display:block; }
  .drawside{ display:flex; flex-direction:column; gap:14px; min-height:0; }
  .drawer{ font-size:26px; font-weight:800; background:var(--card2); border:1px solid var(--line); border-radius:14px; padding:16px; text-align:center; }
  .drawer b{ color:var(--accent); }
  .wordhint{ text-align:center; }
  .wboxes{ display:inline-flex; gap:8px; }
  .wbox{ width:34px; height:44px; border-bottom:5px solid var(--accent); display:inline-block; }
  .wlen{ display:block; margin-top:8px; color:var(--dim); font-size:18px; }
  .dcount{ text-align:center; color:var(--accent2); font-weight:800; font-size:20px; }
  .dglist{ flex:1; overflow:auto; display:flex; flex-direction:column; gap:8px; }
  .grow{ display:flex; align-items:center; gap:10px; background:var(--card2); border:1px solid var(--line); border-radius:10px; padding:10px 14px; font-size:20px; }
  .grow.ok{ border-color:var(--good); background:rgba(34,197,94,.15); }
  .grow b{ color:var(--good); margin-left:auto; }
  .answerbig{ font-size:30px; font-weight:900; text-align:center; background:rgba(34,197,94,.15); border:2px solid var(--good); border-radius:14px; padding:16px; }
  .answerbig b{ color:#4ade80; }
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="brand">рҹҺү нҢҢнӢ° лӮҳмқҙнҠё <small id="pcount"></small></div>
    <div class="codechip" id="topcode"></div>
  </div>
  <div class="main" id="main"></div>
  <div class="ctrlbar" id="ctrl"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io('/party');
const main = document.getElementById('main');
const ctrl = document.getElementById('ctrl');
const topcode = document.getElementById('topcode');
const pcount = document.getElementById('pcount');
let CODE = localStorage.getItem('party_host_code') || null;
let joinURL = '';

socket.on('connect', () => {
  if (CODE) socket.emit('host:resume', { code: CODE });
  else socket.emit('host:create');
});
socket.on('host:created', ({ code }) => {
  CODE = code; localStorage.setItem('party_host_code', code);
  joinURL = location.origin + '/party/play?c=' + code;
});
socket.on('host:gone', () => { localStorage.removeItem('party_host_code'); CODE=null; socket.emit('host:create'); });

const esc = s => String(s==null?'':s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

// в”Җв”Җ к·ёлҰј л§һнһҲкё°: мӢӨмӢңк°„ мә”лІ„мҠӨ в”Җв”Җ
let strokeBuf=[]; let hostDrawRound=null;
function hctx(){ const c=document.getElementById('hcanvas'); return c?c.getContext('2d'):null; }
function clearHostCanvas(){ const c=document.getElementById('hcanvas'); if(c){ const x=c.getContext('2d'); x.fillStyle='#ffffff'; x.fillRect(0,0,c.width,c.height); } }
function drawSeg(x,seg){ const c=document.getElementById('hcanvas'); if(!c) return; x.strokeStyle=seg.c||'#111827'; x.lineWidth=(seg.w||4)*(c.width/1000); x.lineCap='round'; x.lineJoin='round'; x.beginPath(); x.moveTo(seg.x0*c.width,seg.y0*c.height); x.lineTo(seg.x1*c.width,seg.y1*c.height); x.stroke(); }
function replayHostCanvas(){ clearHostCanvas(); const x=hctx(); if(!x) return; strokeBuf.forEach(s=>drawSeg(x,s)); }
socket.on('host:stroke', (seg)=>{ strokeBuf.push(seg); const x=hctx(); if(x) drawSeg(x,seg); });
socket.on('host:strokeClear', ()=>{ strokeBuf=[]; clearHostCanvas(); });

socket.on('host:view', (v) => {
  topcode.innerHTML = v.code ? ('мһ…мһҘмҪ”л“ң <b>'+esc(v.code)+'</b>') : '';
  pcount.textContent = v.playerCount!=null ? ('В· '+v.playerCount+'лӘ… м ‘мҶҚ') : '';
  render(v);
});

function render(v){
  ctrl.innerHTML = '';
  if (v.screen==='lobby') return renderLobby(v);
  if (v.screen==='scoreboard') return renderBoard(v, false);
  if (v.screen==='final') return renderBoard(v, true);
  if (v.screen==='game') return renderGame(v);
}

function renderLobby(v){
  const qr = joinURL ? '<img alt="QR" style="width:100%;height:100%" src="/party/qr?d='+encodeURIComponent(joinURL)+'">' : '';
  const players = v.players||[];
  const plist = players.length ? players.map(p=>(
    '<div class="pchip '+(p.connected?'':'off')+'"><span class="dot" style="background:'+esc(p.color)+'"></span>'+esc(p.nick)+'</div>'
  )).join('') : '<div class="hint">нҸ°мңјлЎң QRмқ„ м°Қм–ҙ мһ…мһҘн•ҳм„ёмҡ”вҖҰ</div>';
  const games = (v.games||[]).map(g=>(
    '<div class="gcard '+(g.done?'done':'')+'" data-id="'+esc(g.id)+'"><div class="em">'+g.emoji+'</div><div class="nm">'+esc(g.name)+'</div><div class="ds">'+esc(g.desc)+'</div></div>'
  )).join('');
  main.innerHTML =
    '<div class="lobby">'+
      '<div class="joinbox">'+
        '<div class="label">нҸ° м№ҙл©”лқјлЎң мҠӨмә” рҹ“·</div>'+
        '<div class="qr">'+qr+'</div>'+
        '<div class="label">лҳҗлҠ” <b style="color:#f1f5f9">'+esc((location.host))+'/party/play</b> м ‘мҶҚ нӣ„</div>'+
        '<div class="bigcode">'+esc(v.code||'В·В·В·В·')+'</div>'+
      '</div>'+
      '<div class="rightcol">'+
        '<div class="players"><h3>м°ёк°Җмһҗ ('+players.filter(p=>p.connected).length+')</h3><div class="plist">'+plist+'</div></div>'+
        '<div class="games"><h3>кІҢмһ„мқ„ кіЁлқј мӢңмһ‘н•ҳм„ёмҡ” в–¶</h3><div class="gcards">'+games+'</div></div>'+
      '</div>'+
    '</div>';
  main.querySelectorAll('.gcard').forEach(c=> c.onclick=()=> socket.emit('host:pickGame',{gameId:c.dataset.id}));
  ctrl.innerHTML = '<span class="hint">кІҢмһ„ м№ҙл“ңлҘј лҲ„лҘҙл©ҙ мӢңмһ‘лҗ©лӢҲлӢӨ В· м§„н–ү мӨ‘м—җлҸ„ мғҲ м°ёк°Җмһҗ мһ…мһҘ к°ҖлҠҘ</span>'+
    (v.gameIndex>0 ? ' <button class="big blue" id="tofinal">мөңмў… кІ°кіј рҹҸҶ</button>' : '');
  const tf=document.getElementById('tofinal'); if(tf) tf.onclick=()=>socket.emit('host:final');
}

function medal(rank){ return rank===1?'рҹҘҮ':rank===2?'рҹҘҲ':rank===3?'рҹҘү':('#'+rank); }

function renderBoard(v, final){
  const board = v.board||[];
  const rows = board.map(p=>(
    '<div class="brow '+(p.rank<=3?('top'+p.rank):'')+'"><div class="rk">'+medal(p.rank)+'</div>'+
    '<span class="dot" style="background:'+esc(p.color)+'"></span><div>'+esc(p.nick)+'</div>'+
    '<div class="sc">'+p.score.toLocaleString()+'м җ</div></div>'
  )).join('');
  if (final){
    const w = board[0];
    main.innerHTML = '<div class="center"><div class="confetti-em">рҹҺҠрҹҸҶрҹҺҠ</div>'+
      '<div class="title-xl">мҡ°мҠ№ '+(w?esc(w.nick):'')+'!</div>'+
      '<div class="sub">мҳӨлҠҳмқҳ мұ”н”јм–ём—җкІҢ мғҒн’Ҳк¶Ңмқ„ рҹҺҒ</div>'+
      '<div class="board">'+rows+'</div></div>';
    ctrl.innerHTML = '<button class="big ghost" id="again">мІҳмқҢмңјлЎң</button>';
    document.getElementById('again').onclick=()=>socket.emit('host:toLobby');
  } else {
    main.innerHTML = '<div class="center"><div class="title-xl">рҹҸ… мў…н•© мҲңмң„</div>'+
      '<div class="sub">'+(v.lastGame?esc(v.lastGame)+' мў…лЈҢ В· ':'')+'кІҢмһ„ '+v.gameIndex+'к°ң мҷ„лЈҢ</div>'+
      '<div class="board">'+rows+'</div></div>';
    ctrl.innerHTML = '<button class="big" id="next">лӢӨмқҢ кІҢмһ„ в–¶</button> <button class="big blue" id="fin">мөңмў… кІ°кіј рҹҸҶ</button>';
    document.getElementById('next').onclick=()=>socket.emit('host:toLobby');
    document.getElementById('fin').onclick=()=>socket.emit('host:final');
  }
}

function clock(sec){ return '<div class="clock '+(sec<=5?'low':'')+'">'+Math.max(0,sec)+'</div>'; }
function nextBtn(label){ ctrl.innerHTML='<button class="big" id="adv">'+(label||'лӢӨмқҢ в–¶')+'</button>';
  document.getElementById('adv').onclick=()=>socket.emit('host:advance'); }

function renderGame(v){
  const g = v.view; const em = v.emoji;
  const head = (right)=> '<div class="stagehead"><div class="g"><span class="em">'+em+'</span>'+esc(v.gameName)+'</div>'+(right||'')+'</div>';
  const rp = (a,b)=>'<span class="roundpill">'+a+' / '+b+'</span>';
  const s = g.screen;

  if (s==='quiz_question'){
    main.innerHTML='<div class="stage">'+head(rp(g.qNum,g.total)+' '+clock(g.secLeft))+
      '<div class="cat">'+({couple:'рҹ’‘ мӢ лһ‘В·мӢ л¶Җ нҖҙмҰҲ',trivia:'рҹ§  мғҒмӢқ',party:'рҹҚ» мҲ мһҗлҰ¬'}[g.category]||'')+'</div>'+
      '<div class="question">'+esc(g.question)+'</div>'+
      '<div class="choices">'+g.choices.map((c,i)=>'<div class="choice"><span class="k">'+'ABCD'[i]+'</span>'+esc(c)+'</div>').join('')+'</div>'+
      '<div class="answered">'+g.answered+' / '+g.connected+' лӘ… мқ‘лӢө</div></div>';
    nextBtn('кІ°кіј кіөк°ң в–¶');
  } else if (s==='quiz_reveal'){
    main.innerHTML='<div class="stage">'+head(rp(g.qNum,g.total))+
      '<div class="question" style="font-size:38px">'+esc(g.question)+'</div>'+
      '<div class="choices">'+g.choices.map((c,i)=>'<div class="choice '+(i===g.correct?'correct':'dim')+'"><span class="k">'+'ABCD'[i]+'</span>'+esc(c)+'<span class="cnt">'+g.dist[i]+'н‘ң</span></div>').join('')+'</div>'+
      '<div class="gains">'+(g.gains.length?g.gains.map(x=>'<div class="g">'+esc(x.nick)+' <b>+'+x.pts+'</b></div>').join(''):'<div class="hint">м •лӢөмһҗк°Җ м—Ҷл„Өмҡ” рҹҳ…</div>')+'</div></div>';
    nextBtn(g.isLast?'м җмҲҳ м§‘кі„ в–¶':'лӢӨмқҢ л¬ём ң в–¶');
  } else if (s==='draw_drawing'){
    const boxes='<span class="wboxes">'+Array.from({length:g.wordLen}).map(()=>'<span class="wbox"></span>').join('')+'</span> <span class="wlen">'+g.wordLen+'кёҖмһҗ</span>';
    const glist=g.guessers.map(x=>'<div class="grow '+(x.guessed?'ok':'')+'"><span class="dot" style="background:'+esc(x.color)+'"></span>'+esc(x.nick)+(x.guessed?' <b>м •лӢө!</b>':'')+'</div>').join('')||'<div class="hint">м°ёк°Җмһҗ лҢҖкё° мӨ‘вҖҰ</div>';
    if(hostDrawRound===g.round && document.getElementById('hcanvas')){
      // к°ҷмқҖ лқјмҡҙл“ң мһ¬л ҢлҚ”: мә”лІ„мҠӨ мң м§Җ, м •ліҙл§Ң к°ұмӢ 
      const t=document.getElementById('dtimer'); if(t) t.outerHTML=clock(g.secLeft).replace('class="clock','id="dtimer" class="clock');
      const gl=document.getElementById('dglist'); if(gl) gl.innerHTML=glist;
      const cc=document.getElementById('dcount'); if(cc) cc.textContent=g.correctCount+' / '+g.guessers.length+' лӘ… м •лӢө';
    } else {
      hostDrawRound=g.round; strokeBuf=[];
      main.innerHTML='<div class="stage">'+
        '<div class="stagehead"><div class="g"><span class="em">'+em+'</span>'+esc(v.gameName)+'</div>'+rp(g.round,g.total)+' '+clock(g.secLeft).replace('class="clock','id="dtimer" class="clock')+'</div>'+
        '<div class="drawrow"><div class="canvaswrap"><canvas id="hcanvas" width="1000" height="600"></canvas></div>'+
        '<div class="drawside"><div class="drawer">рҹҺЁ <b>'+esc(g.drawerNick)+'</b> лӢҳмқҙ<br>к·ёлҰ¬лҠ” мӨ‘</div>'+
        '<div class="wordhint">'+boxes+'</div>'+
        '<div class="dcount" id="dcount">'+g.correctCount+' / '+g.guessers.length+' лӘ… м •лӢө</div>'+
        '<div class="dglist" id="dglist">'+glist+'</div></div></div></div>';
      clearHostCanvas();
    }
    nextBtn('к·ёлҰј мў…лЈҢ в–¶');
  } else if (s==='draw_reveal'){
    const rows=g.results.map(r=>'<div class="rrow"><span class="medal">'+medal(r.order+1)+'</span>'+esc(r.nick)+'<span class="pt">+'+r.pts+'</span></div>').join('')||'<div class="hint">м•„л¬ҙлҸ„ лӘ» л§һнҳ”м–ҙмҡ” рҹҳ…</div>';
    main.innerHTML='<div class="stage">'+head(rp(g.round,g.total))+
      '<div class="drawrow"><div class="canvaswrap"><canvas id="hcanvas" width="1000" height="600"></canvas></div>'+
      '<div class="drawside"><div class="answerbig">м •лӢө: <b>'+esc(g.word)+'</b></div>'+
      '<div class="drawer">рҹҺЁ '+esc(g.drawerNick)+' <span style="color:#22c55e">+'+g.drawerPts+'</span></div>'+
      '<div class="rank" style="margin-top:8px">'+rows+'</div></div></div></div>';
    replayHostCanvas();
    nextBtn(g.isLast?'м җмҲҳ м§‘кі„ в–¶':'лӢӨмқҢ к·ёлҰј в–¶');
  } else if (s==='reaction_ready'){
    main.innerHTML='<div class="stage">'+head(rp(g.round,g.total))+
      '<div class="reactBig ready">вңӢ мӨҖл№„вҖҰ<div style="font-size:24px;color:#eab308;margin-top:16px">мӢ нҳёк°Җ лңЁл©ҙ нҸ°мқ„ нғӯ! (лҜёлҰ¬ лҲ„лҘҙл©ҙ л¶Җм •м¶ңл°ң)</div></div>'+
      (g.falseStarts.length?'<div class="answered">рҹҡ« л¶Җм •м¶ңл°ң: '+g.falseStarts.map(esc).join(', ')+'</div>':'')+'</div>';
    ctrl.innerHTML='<span class="hint">мһ мӢң нӣ„ мһҗлҸҷмңјлЎң мӢ нҳёк°Җ лӮҳк°‘лӢҲлӢӨвҖҰ</span>';
  } else if (s==='reaction_go'){
    main.innerHTML='<div class="stage">'+head(rp(g.round,g.total))+
      '<div class="reactBig go">м§ҖкёҲ нғӯ!!</div><div class="answered">'+g.tapped+' / '+g.connected+' лӘ… л°ҳмқ‘</div></div>';
    ctrl.innerHTML='<span class="hint">к°ҖмһҘ л№ лҘё мҲңм„ңлҢҖлЎң м җмҲҳвҖҰ</span>';
  } else if (s==='reaction_reveal'){
    const rows=g.ranking.map(r=>'<div class="rrow"><span class="medal">'+medal(r.rank)+'</span>'+esc(r.nick)+'<span class="ms">'+r.ms+'ms</span><span class="pt">+'+r.pts+'</span></div>').join('')||'<div class="hint">м•„л¬ҙлҸ„ л°ҳмқ‘ лӘ»н–Ҳм–ҙмҡ” рҹҳҙ</div>';
    main.innerHTML='<div class="stage">'+head(rp(g.round,g.total))+
      '<div class="rank">'+rows+'</div>'+
      (g.falseStarts.length?'<div class="answered">рҹҡ« л¶Җм •м¶ңл°ң(0м җ): '+g.falseStarts.map(esc).join(', ')+'</div>':'')+'</div>';
    nextBtn(g.isLast?'м җмҲҳ м§‘кі„ в–¶':'лӢӨмқҢ лқјмҡҙл“ң в–¶');
  } else {
    main.innerHTML='<div class="stage">'+head('')+'<div class="question">мӨҖл№„ мӨ‘вҖҰ</div></div>';
  }
}
</script>
</body>
</html>
